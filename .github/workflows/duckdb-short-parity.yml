name: duckdb-short-parity

on:
  pull_request:
  workflow_dispatch:

jobs:
  duckdb-short-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start build timer
        run: echo "BUILD_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build Docker image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: gk-yosoku:latest
          cache-from: type=gha,scope=duckdb-short-parity
          cache-to: type=gha,mode=max,scope=duckdb-short-parity

      - name: Stop build timer
        if: always()
        run: |
          build_finished=$(date +%s)
          build_seconds=$((build_finished - BUILD_STARTED))
          echo "BUILD_SECONDS=${build_seconds}" >> "$GITHUB_ENV"

      - name: Prepare short fixture data
        run: |
          mkdir -p data/raw
          cat > data/raw/girls_results_20260225.csv <<'CSV'
          race_date,venue,race_number,racedetail_id,show_result_url,rank,result_status,frame_number,car_number,player_name,age,class,raw_cells
          2026-02-25,toride,1,2320260225020001,u,1,normal,1,1,A,30,L1,◎ | 1 | 1 | A
          2026-02-25,toride,1,2320260225020001,u,2,normal,2,2,B,28,L1,○ | 2 | 2 | B
          2026-02-25,toride,1,2320260225020001,u,3,normal,3,3,C,26,L1,▲ | 3 | 3 | C
          CSV
          cat > data/raw/girls_results_20260226.csv <<'CSV'
          race_date,venue,race_number,racedetail_id,show_result_url,rank,result_status,frame_number,car_number,player_name,age,class,raw_cells
          2026-02-26,toride,1,2320260225030001,u,1,normal,1,1,A,30,L1,◎ | 1 | 1 | A
          2026-02-26,toride,1,2320260225030001,u,2,normal,2,2,B,28,L1,○ | 2 | 2 | B
          2026-02-26,toride,1,2320260225030001,u,3,normal,3,3,C,26,L1,▲ | 3 | 3 | C
          CSV

      - name: Start parity timer
        run: echo "PARITY_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - name: Restore timing history cache
        uses: actions/cache/restore@v4
        with:
          path: reports/ci_timing/history.jsonl
          key: duckdb-short-parity-history-${{ github.ref_name }}
          restore-keys: |
            duckdb-short-parity-history-${{ github.ref_name }}-
            duckdb-short-parity-history-

      - name: Run short parity flow (DuckDB-only)
        run: |
          make parquet-bootstrap FROM=2026-02-25 TO=2026-02-26
          make features-duckdb FROM=2026-02-25 TO=2026-02-26
          make validate-duckdb FROM=2026-02-25 TO=2026-02-26

      - name: Write timing report
        if: always()
        run: |
          mkdir -p reports/ci_timing
          build_seconds="${BUILD_SECONDS:-0}"
          parity_seconds=0
          if [ -n "${PARITY_STARTED:-}" ]; then
            parity_finished=$(date +%s)
            parity_seconds=$((parity_finished - PARITY_STARTED))
          fi
          total_seconds=$((build_seconds + parity_seconds))
          history_path="reports/ci_timing/history.jsonl"
          previous_total=""
          if [ -s "${history_path}" ]; then
            previous_total=$(ruby -rjson -e 'line=File.readlines(ARGV[0]).last; puts(JSON.parse(line)["total_seconds"])' "${history_path}" 2>/dev/null || true)
          fi
          delta_seconds=0
          delta_pct="N/A"
          warning_note=""
          if [ -n "${previous_total}" ]; then
            delta_seconds=$((total_seconds - previous_total))
            if [ "${previous_total}" -gt 0 ]; then
              delta_pct=$(ruby -e 'prev=ARGV[0].to_f; cur=ARGV[1].to_f; printf("%.1f%%", ((cur-prev)/prev)*100.0)' "${previous_total}" "${total_seconds}")
              if ruby -e 'prev=ARGV[0].to_f; cur=ARGV[1].to_f; exit(((cur-prev)/prev) > 0.2 ? 0 : 1)' "${previous_total}" "${total_seconds}"; then
                warning_note=":warning: total time regression detected (>20%)"
              fi
            fi
          fi
          printf '{"run_id":%s,"build_seconds":%s,"parity_seconds":%s,"total_seconds":%s}\n' \
            "${{ github.run_id }}" "${build_seconds}" "${parity_seconds}" "${total_seconds}" >> "${history_path}"
          recent_table=$(tail -n 20 "${history_path}" | ruby -rjson -e '
            lines = STDIN.read.split("\n").reject(&:empty?)
            puts "| Run | Build(s) | Parity(s) | Total(s) |"
            puts "| ---: | ---: | ---: | ---: |"
            lines.each do |line|
              row = JSON.parse(line)
              puts "| #{row["run_id"]} | #{row["build_seconds"]} | #{row["parity_seconds"]} | #{row["total_seconds"]} |"
            end
          ')
          cat > reports/ci_timing/duckdb_short_parity_timing.json <<JSON
          {
            "workflow": "duckdb-short-parity",
            "build_seconds": ${build_seconds},
            "parity_seconds": ${parity_seconds},
            "total_seconds": ${total_seconds},
            "previous_total_seconds": ${previous_total:-null},
            "delta_seconds": ${delta_seconds},
            "delta_percent": "${delta_pct}"
          }
          JSON
          {
            echo "## duckdb-short-parity timing"
            echo ""
            echo "| Step | Seconds |"
            echo "| --- | ---: |"
            echo "| image build | ${build_seconds} |"
            echo "| parity run | ${parity_seconds} |"
            echo "| total | ${total_seconds} |"
            echo ""
            echo "### Delta"
            echo ""
            if [ -n "${previous_total}" ]; then
              echo "- previous total: ${previous_total}s"
              echo "- delta: ${delta_seconds}s (${delta_pct})"
            else
              echo "- previous total: N/A (no history)"
            fi
            if [ -n "${warning_note}" ]; then
              echo ""
              echo "${warning_note}"
            fi
            echo ""
            echo "### Recent runs (last 20)"
            echo ""
            echo "${recent_table}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload duckdb validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-validation-reports
          path: reports/duckdb_validation
          if-no-files-found: warn

      - name: Upload ci timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-short-parity-timing
          path: reports/ci_timing/duckdb_short_parity_timing.json
          if-no-files-found: warn

      - name: Save timing history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: reports/ci_timing/history.jsonl
          key: duckdb-short-parity-history-${{ github.ref_name }}-${{ github.run_id }}
